media:
  input: assets/img

settings:
  url: https://mayankvikash.github.io 

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    format: yaml-frontmatter
    # Chirpy files MUST follow the naming convention: YYYY-MM-DD-title.md
    filename: "{year}-{month}-{day}-{slug}.md"
    links:
      - label: View Post
        url: /posts/{slug}/
    default:
      layout: post 
    fields:
      - name: title
        type: string
        label: Post Title
        required: true
      - name: date
        type: datetime
        label: Publish Date
        # Automatically fills the current date/time zone for Chirpy's scheduler
        default: now
      - name: description
        type: string
        label: Short Description (SEO)
      - name: categories
        type: list
        label: Categories
        description: "Max 2. Example: [Python, 100DaysOfCode]"
      - name: tags
        type: list
        label: Tags
        description: "Comma-separated words. Example: [basics, loops]"
      - name: body
        type: rich-text
        label: Write your content here