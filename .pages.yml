media:
  input: assets/img

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        label: Post Title
      - name: date
        type: date
        label: Publish Date
      - name: categories
        type: string
        label: Categories
      - name: tags
        type: string
        label: Tags
      - name: description
        type: string
        label: Short Description
      - name: body
        type: rich-text
        label: Write your content here
