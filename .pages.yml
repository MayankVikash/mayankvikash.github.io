media:
  input: assets/img

settings:
  url: https://mayankvikash.github.io 

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{slug}.md"
    links:
      - label: View Post
        url: /posts/{slug}/
    fields:
      - name: title
        type: string
        label: Post Title
        required: true
      - name: date
        type: string
        label: Publish Date
        required: true
        default: "{{now}}"
      - name: description
        type: string
        label: Short Description (SEO)
      - name: categories
        type: list
        label: Categories
      - name: tags
        type: list
        label: Tags
      - name: body
        type: rich-text
        label: Write your content here